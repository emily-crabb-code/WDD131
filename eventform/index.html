
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket</title>
  <link rel="stylesheet" href="index.css" />
  <script src="index.js" defer></script>
</head>
<body>
  <main class="wrapper">
    <h1>Event Ticket</h1>

    <form id="ticketForm">
      <div class="field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" required />
      </div>

      <div class="field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" required />
      </div>

      <div class="field full">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="field">
        <label for="tickettype">Type</label>
        <select
          id="tickettype"
          name="tickettype"
          aria-controls="notesContainer"
          required
        >
          <option value="">Choose one</option>
          <option value="one">Student</option>
          <option value="many">Guest</option>
        </select>
      </div>

      <div class="field">
        <label for="eventDate">Event Date</label>
        <input id="eventDate" name="eventDate" type="date" required />
      </div>

      <div id="studentContainer" class="field full" hidden>
        <label for="notes">Student ID</label>
        <input id="notes" name="notes" type="text" />
      </div>

      <div id="passwordContainer" class="field full" hidden>
        <label for="guestPassword">Guest Password</label>
        <input id="guestPassword" name="guestPassword" type="password" />
      </div>

      <button class="full" type="submit">Submit Preferences</button>
    </form>

    <section id="output" aria-live="polite"></section>
  </main>
</body>
</html>
